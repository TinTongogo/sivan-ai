<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sivan 管理控制台 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            width: 360px;
            text-align: center;
        }
        .login-box h1 { font-size: 20px; margin-bottom: 8px; }
        .login-box p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        .login-box input {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }
        .login-box input:focus { border-color: #3b82f6; }
        .login-box button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .login-box button:hover { background: #2563eb; }
        .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; }
/* ── Dark Mode ── */
body.dark-mode .login-container { background: var(--surface); }
body.dark-mode .login-card { background: var(--surface); box-shadow: 0 4px 32px rgba(0,0,0,0.4); }    </style>
</head>
<body>
    <div class="login-box">
        <h1>Sivan 管理控制台</h1>
        <p>请输入 API Key 以继续</p>
        {% if error %}
        <div class="error">API Key 不正确，请重试</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="password" name="api_key" placeholder="API Key" required autofocus>
            <button type="submit">登录</button>
        </form>
    </div>
</body>
</html>
