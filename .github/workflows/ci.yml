# Sivan CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint with ruff
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short

  migration-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Check alembic migration is up-to-date
        run: |
          TMP_DB=$(mktemp /tmp/sivan_ci_XXXX.db)
          PYTHONPATH="$PWD" SIVAN_DB_PATH="$TMP_DB" uv run alembic upgrade head
          PYTHONPATH="$PWD" SIVAN_DB_PATH="$TMP_DB" uv run alembic check
          echo "✅ 迁移状态一致"
